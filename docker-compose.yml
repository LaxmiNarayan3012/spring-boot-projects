services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
      TZ: Asia/Kolkata
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 10
      timeout: 5s

  spring-app:
    build: .
    container_name: spring-app
    restart: always
    depends_on:
      mysql-db:
        condition: service_healthy   # ⭐ VERY IMPORTANT
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8080"
    networks:
      - spring-net

volumes:
  mysql-data:

networks:
  spring-net: